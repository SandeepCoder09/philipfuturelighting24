<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Recharge | Philips</title>

  <!-- ==================== Shared CSS ========================== -->
  <link rel="stylesheet" href="../shared/css/top-nav.css">

<!-- ===================== Main CSS ========================== -->
  <link rel="stylesheet" href="../wallet/wallet.css">
  

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <!-- 🔷 Fixed Navbar -->
  <div class="top-nav">

  <button class="back-btn" onclick="history.back()">
    <i class="fa-solid fa-arrow-left"></i>
    Back
  </button>

  <h2 class="page-title">Deposit Fund</h2>

  <!-- New Records Button -->
  <!-- New Records Button -->
  <button class="nav-right-btn" onclick="window.location.href='../wallet/records/recharge-records.html'">
    <i class="fa-solid fa-clock-rotate-left"></i>
    Records
  </button>

</div>

<section class="wallet-container recharge-page">

  <div class="wallet-card">

    <label>
      <i class='bx bx-wallet'></i>
      Selected Amount
    </label>

    <input type="text" id="selectedAmount" placeholder="Select amount" readonly />

    <div class="amount-options">
      <button type="button" class="amount-btn" data-amount="1">
        ₹1
      </button>
      <button type="button" class="amount-btn" data-amount="99">
        ₹99
      </button>
      <button type="button" class="amount-btn" data-amount="499">
        ₹499
      </button>
      <button type="button" class="amount-btn" data-amount="999">
        ₹999
      </button>
      <button type="button" class="amount-btn" data-amount="4999">
        ₹4999
      </button>
    </div>

    <button id="rechargeBtn" class="wallet-btn recharge-style">
      <i class='bx bx-bolt'></i>
      Deposit Now
    </button>

  </div>

</section>

<!-- ================== Cashfree SDK SCRIPT ================== -->
<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

<!-- ==================== Shared JS ========================== -->
<script src="../shared/js/config.js"></script>

<!-- ===================== Main JS ========================== -->
<script src="../wallet/recharge.js"></script>
</body>
</html>
