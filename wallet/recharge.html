<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="theme-color" content="#0f172a" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Recharge | Philips</title>

    <link rel="icon" href="/assets/favicon.png" />

    <link rel="stylesheet" href="../shared/css/top-nav.css" />
    <link rel="stylesheet" href="../shared/ui/popup.css" />
    <link rel="stylesheet" href="./recharge.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="top-nav">
      <button class="back-btn" onclick="history.back()">
        <i class="fa-solid fa-arrow-left icon-3d"></i>
        Back
      </button>

      <h2 class="page-title">Deposit Fund</h2>

      <button
        class="nav-right-btn"
        onclick="window.location.href='../wallet/records/recharge-records.html'"
      >
        <i class="fa-solid fa-clock-rotate-left icon-3d"></i>
        Records
      </button>
    </div>

    <section class="wallet-container recharge-page">
      <!-- TABS -->

      <div class="payment-tabs">
        <button class="tab-btn active" data-method="inr">INR</button>

        <button class="tab-btn" data-method="usdt">USDT</button>
      </div>

      <!-- INR SECTION -->

      <div class="inr-section">
        <div class="wallet-card">
          <label>
            <i class="fa-solid fa-wallet icon-3d"></i>
            Selected Amount
          </label>

          <input
            type="text"
            id="selectedAmount"
            placeholder="Select amount"
            readonly
          />

          <div class="amount-options">
            <button type="button" class="amount-btn" data-amount="399">
              ₹399
            </button>
            <button type="button" class="amount-btn" data-amount="1499">
              ₹1499
            </button>
            <button type="button" class="amount-btn" data-amount="4999">
              ₹4999
            </button>
            <button type="button" class="amount-btn" data-amount="9499">
              ₹9499
            </button>
            <button type="button" class="amount-btn" data-amount="49999">
              ₹49999
            </button>
            <button type="button" class="amount-btn" data-amount="99999">
              ₹99999
            </button>
          </div>

          <button id="rechargeBtn" class="wallet-btn recharge-style">
            <i class="fa-solid fa-bolt icon-3d"></i>
            Deposit Now
          </button>
        </div>
      </div>

      <!-- USDT SECTION -->

      <div class="usdt-section" style="display: none">
        <div class="wallet-card usdt-balance-card">
          <div class="usdt-balance-header">
            <i class="fa-solid fa-coins icon-3d"></i>
            <span>Available USDT Balance</span>
          </div>

          <div class="usdt-balance-amount">
            <span id="usdtBalance">0.00</span> USDT
          </div>

          <div class="usdt-balance-inr">
            ≈ ₹<span id="usdtInrValue">0</span>
          </div>

          <button id="convertToInrBtn" class="wallet-btn convert-style">
            <i class="fa-solid fa-right-left icon-3d"></i>
            Convert to INR
          </button>
        </div>

        <div class="wallet-card">
          <label>Network</label>

          <div class="usdt-network-badge">USDT (TRC20 - Tron)</div>

          <div class="usdt-address-wrapper">
            <div id="usdtAddress" class="usdt-address">
              TPXJ5Yjzzz4397BX56cDuMpCSU1bWDbtqh
            </div>

            <button id="copyAddressBtn" class="copy-icon-btn">
              <i class="fa-solid fa-copy icon-3d"></i>
            </button>
          </div>

          <label>Enter Amount (USDT)</label>

          <input
            type="number"
            id="usdtAmount"
            placeholder="Enter USDT amount"
          />

          <label>Transaction Hash</label>

          <input
            type="text"
            id="txnHash"
            placeholder="Paste transaction hash"
          />

          <button id="usdtSubmit" class="wallet-btn recharge-style">
            Submit Deposit
          </button>
        </div>
      </div>
    </section>

    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

    <script src="../shared/js/config.js"></script>
    <script src="../shared/ui/popup.js"></script>

    <script src="../wallet/recharge.js"></script>
  </body>
</html>
