<!DOCTYPE html>
<html>
<head>
  <title>Bind Bank</title>
  <link rel="stylesheet" href="bind-card.css">
</head>
<body>

<div class="container">
  <div class="card">
    <h2>Bind Bank Account</h2>

    <input id="accountNumber" placeholder="Account Number">
    <input id="ifsc" placeholder="IFSC Code">
    <input id="holderName" placeholder="Account Holder Name">
    <input id="bankName" placeholder="Bank Name">

    <button onclick="bindBank()">Submit</button>
  </div>
</div>

<script src="bind-card.js"></script>
</body>
</html>
