<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bind Bank Account</title>
  <link rel="stylesheet" href="bind-card.css">
</head>
<body>

<div class="container">
  <div class="bank-card">

    <h2>Bind Bank Account</h2>
    <p class="subtitle">Link your bank for secure withdrawals</p>

    <div class="input-group">
      <span class="icon">🏦</span>
      <input id="accountNumber" type="text" placeholder="Account Number">
    </div>

    <div class="input-group">
      <span class="icon">🔢</span>
      <input id="ifsc" type="text" placeholder="IFSC Code">
    </div>

    <div class="input-group">
      <span class="icon">👤</span>
      <input id="holderName" type="text" placeholder="Account Holder Name">
    </div>

    <div class="input-group">
      <span class="icon">🏛</span>
      <input id="bankName" type="text" placeholder="Bank Name">
    </div>

    <button id="submitBtn" onclick="bindBank()">
      <span id="btnText">Bind Bank Card</span>
      <div class="loader hidden"></div>
    </button>

    <div id="messageBox" class="message hidden"></div>

  </div>
</div>

<script src="bind-card.js"></script>
</body>
</html>
