<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Set Withdraw PIN | Philips</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ==================== Shared CSS ========================== -->
  <link rel="stylesheet" href="../../shared/css/top-nav.css">

<!-- ===================== Main CSS ========================== -->
  <link rel="stylesheet" href="../withdraws-pin/set-withdraw-pin.css">

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <!-- 🔷 Fixed Navbar -->
  <div class="top-nav">
    <button class="back-btn" onclick="window.location.href='../withdraw.html'">
      <i class="fa-solid fa-arrow-left"></i>
      Back
    </button>
    <h2 class="page-title">Set Withdraw PIN</h2>
  </div>

  <!-- 📦 Page Content -->
  <div class="page-content">

    <div class="pin-card">

      <!-- 🔐 Security Image -->
      <img 
        src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png"
        alt="Secure Shield"
        class="security-image"
      >

      <p class="pin-subtitle">
        Protect your wallet with a secure 4-digit PIN.
      </p>

      <!-- 🔐 PIN BOXES -->
<div class="pin-wrapper">
  <input type="password" maxlength="1" class="pin-box" />
  <input type="password" maxlength="1" class="pin-box" />
  <input type="password" maxlength="1" class="pin-box" />
  <input type="password" maxlength="1" class="pin-box" />
</div>

<!-- 🔐 CONFIRM PIN BOXES -->
<div class="pin-wrapper">
  <input type="password" maxlength="1" class="confirm-box" />
  <input type="password" maxlength="1" class="confirm-box" />
  <input type="password" maxlength="1" class="confirm-box" />
  <input type="password" maxlength="1" class="confirm-box" />
</div>

      <!-- Submit -->
      <button id="setPinBtn" class="primary-btn">
        <i class="fa-solid fa-shield-halved"></i>
        Set Secure PIN
      </button>

      <div id="pinToast" class="pin-toast"></div>

    </div>

  </div>

  <!-- ==================== Shared JS ========================== -->
<script src="../../shared/js/config.js"></script>

<!-- ===================== Main JS ========================== -->
  <script src="../withdraws-pin/set-withdraw-pin.js"></script>
</body>
</html>
