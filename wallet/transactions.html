<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transaction History | Philips</title>
  <link rel="icon" href="/assets/favicon.png" />
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- ==================== Shared CSS ========================== -->
  <link rel="stylesheet" href="../shared/css/top-nav.css">

<!-- ===================== Main CSS ========================== -->
  <link rel="stylesheet" href="../wallet/transactions.css">


  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <!-- 🔷 Fixed Navbar -->
  <div class="top-nav">

    <button class="back-btn" onclick="history.back()">
      <i class="fa-solid fa-arrow-left"></i>
      Back
    </button>

    <h2 class="page-title">Transaction History</h2>

  </div>

  <!-- 🔽 Fixed Filter -->
  <div class="filter-wrapper">
    <div class="filter-container">
      <select id="transactionFilter">
        <option value="all" selected>All Transactions</option>
        <option value="recharge">Recharge</option>
        <option value="withdraw">Withdraw</option>
        <option value="purchase">Purchase</option>
        <option value="earning">Earning</option>
      </select>
    </div>
  </div>

  <!-- Transactions -->
  <div class="transactions-wrapper">
    <div id="transactionList"></div>
  </div>

  <!-- ==================== Shared JS ========================== -->
<script src="../shared/js/config.js"></script>
<script src="../shared/ui/popup.js"></script>
<!-- ===================== Main JS ========================== -->
  <script src="../wallet/transactions.js"></script>

</body>
</html>
