<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="theme-color" content="#111827" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Profile | Philips India</title>

    <link rel="icon" href="/assets/favicon.png" />

    <link rel="stylesheet" href="../shared/css/bottom-nav.css" />
    <link rel="stylesheet" href="../home/style.css" />
    <link rel="stylesheet" href="../profile/style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <nav class="navbar">
      <div class="logo-wrapper">
        <a href="../home/index.html">
          <img
            src="../assets/philips-logo-png-transparent.png"
            alt="Philips Logo"
          />
        </a>

        <div class="led-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <button onclick="logout()" class="nav-logout-btn">
        <!-- Logout -->
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </nav>

    <section class="profile-container">
      <div class="profile-header">
        <div class="profile-top">
          <div class="profile-img small">
            <img
              src="../assets/bulb10watts.webp"
              onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'"
              alt="Profile"
            />
          </div>

          <div class="user-details">
            <h2 id="username">Loading...</h2>

            <p class="profile-id">
              <i class="fa-solid fa-id-card"></i>
              ID: <span id="uid">Loading...</span>
            </p>

            <p class="mobile-top">
              <i class="fa-solid fa-mobile-screen-button"></i>
              Mobile: <span id="mobile">Loading...</span>
            </p>
          </div>
        </div>

        <div class="wallet-box">
          <div class="wallet-header">
            <div class="wallet-title">
              <i class="fa-solid fa-wallet"></i>
              <span>Current Balance</span>
            </div>

            <button id="refreshWalletBtn" class="refresh-btn">
              <i class="fa-solid fa-rotate-right"></i>
            </button>
          </div>

          <h3>₹<span id="walletBalance">0</span></h3>
        </div>

        <!-- ACTION BUTTONS -->

        <div class="action-buttons">
          <a href="../wallet/recharge.html" class="action-btn recharge">
            <svg class="icon3d" viewBox="0 0 100 100">
              <defs>
                <linearGradient id="g1" x1="0" x2="1">
                  <stop offset="0%" stop-color="#00e0ff" />
                  <stop offset="100%" stop-color="#1b75ff" />
                </linearGradient>
              </defs>

              <circle cx="50" cy="50" r="40" fill="url(#g1)" />
              <polygon
                points="55,20 35,55 55,55 45,80 70,40 50,40"
                fill="white"
              />
            </svg>

            <span>Deposit</span>
          </a>

          <a href="../wallet/withdraw.html" class="action-btn withdraw">
            <svg class="icon3d" viewBox="0 0 100 100">
              <defs>
                <linearGradient id="g2" x1="0" x2="1">
                  <stop offset="0%" stop-color="#ff9800" />
                  <stop offset="100%" stop-color="#ff5722" />
                </linearGradient>
              </defs>

              <circle cx="50" cy="50" r="40" fill="url(#g2)" />
              <rect x="30" y="40" width="40" height="20" rx="4" fill="white" />
              <polygon points="65,35 80,50 65,65" fill="white" />
            </svg>

            <span>Withdrawal</span>
          </a>
        </div>
      </div>

      <!-- MENU -->

      <div class="profile-card menu-card">
        <a href="../wallet/bind-card.html" class="menu-item">
          <div class="menu-left">
            <svg class="menu-icon3d" viewBox="0 0 100 100">
              <rect
                x="20"
                y="30"
                width="60"
                height="40"
                rx="6"
                fill="#19d1ff"
              />
              <rect x="20" y="40" width="60" height="8" fill="#0f172a" />
            </svg>

            My Bank Cards
          </div>

          <i class="fa-solid fa-chevron-right"></i>
        </a>

        <a href="../wallet/transactions.html" class="menu-item">
          <div class="menu-left">
            <svg class="menu-icon3d" viewBox="0 0 100 100">
              <rect x="25" y="20" width="50" height="60" fill="#19d1ff" />
              <line
                x1="35"
                y1="35"
                x2="65"
                y2="35"
                stroke="white"
                stroke-width="4"
              />
              <line
                x1="35"
                y1="50"
                x2="65"
                y2="50"
                stroke="white"
                stroke-width="4"
              />
              <line
                x1="35"
                y1="65"
                x2="55"
                y2="65"
                stroke="white"
                stroke-width="4"
              />
            </svg>

            Transaction History
          </div>

          <i class="fa-solid fa-chevron-right"></i>
        </a>

        <a href="../gift/gift.html" class="menu-item">
          <div class="menu-left">
            <svg class="menu-icon3d" viewBox="0 0 100 100">
              <rect x="20" y="40" width="60" height="40" fill="#19d1ff" />

              <rect x="45" y="40" width="10" height="40" fill="white" />

              <rect x="20" y="30" width="60" height="10" fill="#0aa2ff" />
            </svg>

            Redeem Gift Code
          </div>

          <i class="fa-solid fa-chevron-right"></i>
        </a>

        <a href="https://www.t.me/radhe_rani_sarkarr" class="menu-item">
          <div class="menu-left">
            <svg class="menu-icon3d" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="30" fill="#19d1ff" />
              <path
                d="M40 50 L48 58 L65 40"
                stroke="white"
                stroke-width="5"
                fill="none"
              />
            </svg>

            Customer Service
          </div>

          <i class="fa-solid fa-chevron-right"></i>
        </a>
      </div>
    </section>

    <nav class="bottom-nav">
      <a href="../home/index.html" class="nav-btn">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </a>

      <a href="../products/index.html" class="nav-btn">
        <i class="fa-solid fa-lightbulb"></i>
        <span>Products</span>
      </a>

      <a href="../referrals/index.html" class="nav-btn">
        <i class="fa-solid fa-gift"></i>
        <span>Referrals</span>
      </a>

      <a href="../profile/index.html" class="nav-btn active">
        <i class="fa-solid fa-user"></i>
        <span>Profile</span>
      </a>
    </nav>

    <script src="../shared/js/config.js"></script>
    <script src="../profile/script.js"></script>
  </body>
</html>
