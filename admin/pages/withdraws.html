<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Withdraw Requests | Admin</title>

    <!-- Main Styles -->
    <link rel="stylesheet" href="../css/style.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="layout">
      <!-- ================= SIDEBAR ================= -->
      <aside class="sidebar" id="sidebar">
        <h2 class="logo">PHILIPS ADMIN</h2>

        <nav class="nav-menu">
          <a href="../index.html">
            <i class="fa-solid fa-gauge"></i>
            <span>Dashboard</span>
          </a>

          <a href="users.html">
            <i class="fa-solid fa-users"></i>
            <span>Users</span>
          </a>

          <a href="withdraws.html" class="active">
            <i class="fa-solid fa-money-bill-transfer"></i>
            <span>Withdraws</span>
          </a>

          <a href="transactions.html">
            <i class="fa-solid fa-arrow-right-arrow-left"></i>
            <span>Transactions</span>
          </a>

          <a href="banks.html">
            <i class="fa-solid fa-building-columns"></i>
            <span>Banks</span>
          </a>

          <!-- NEW GIFT MENU -->
          <a href="gift.html">
            <i class="fa-solid fa-gift"></i>
            <span>Gift Codes</span>
          </a>
        </nav>
      </aside>

      <!-- ================= MAIN ================= -->
      <main class="main">
        <!-- ========== TOPBAR ========== -->
        <header class="topbar">
          <div class="topbar-left">
            <button class="menu-toggle" onclick="toggleSidebar()">
              <i class="fa-solid fa-bars"></i>
            </button>
            <h1>Withdraw Requests</h1>
          </div>

          <div class="topbar-right">
            <button class="logout-btn" onclick="logout()">
              <i class="fa-solid fa-right-from-bracket"></i>
              Logout
            </button>
          </div>
        </header>

        <!-- ========== FILTER SECTION ========== -->
        <section class="search-section">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input
              type="number"
              id="searchUserId"
              placeholder="Search by User ID"
            />
          </div>

          <select id="statusFilter" class="filter-btn">
            <option value="processing">Processing</option>
            <option value="under review">Under Review</option>
            <option value="success">Success</option>
            <option value="rejected">Rejected</option>
            <option value="all">All</option>
          </select>

          <input type="date" id="startDate" class="filter-btn" />
          <input type="date" id="endDate" class="filter-btn" />

          <button class="search-btn" onclick="applyFilters()">
            <i class="fa-solid fa-filter"></i>
            Apply
          </button>

          <button class="filter-btn" onclick="resetFilters()">
            <i class="fa-solid fa-rotate"></i>
            Reset
          </button>
        </section>

        <!-- ========== TABLE SECTION ========== -->
        <section class="table-container">
          <table>
            <thead>
              <tr>
                <th><i class="fa-solid fa-id-card"></i> User ID</th>
                <th><i class="fa-solid fa-indian-rupee-sign"></i> Amount</th>
                <th><i class="fa-solid fa-info-circle"></i> Status</th>
                <th><i class="fa-solid fa-gears"></i> Action</th>
              </tr>
            </thead>
            <tbody id="withdrawTable">
              <!-- Withdraw data loads dynamically -->
            </tbody>
          </table>
        </section>
      </main>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- ================= SCRIPTS ================= -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/withdraws.js"></script>
  </body>
</html>
