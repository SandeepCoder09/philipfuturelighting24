<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users | Admin</title>

    <link rel="icon" href="/assets/favicon.png" />

    <!-- Main Styles -->
    <link rel="stylesheet" href="../css/style.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="layout">
      <!-- ================= SIDEBAR ================= -->
      <aside class="sidebar" id="sidebar">
        <h2 class="logo">
          <i class="fa-solid fa-shield-halved"></i>
          PHILIPS ADMIN
        </h2>

        <nav class="nav-menu">
          <a href="/admin/index.html">
            <i class="fa-solid fa-gauge"></i>
            <span>Dashboard</span>
          </a>

          <a href="/admin/pages/users.html" class="active">
            <i class="fa-solid fa-users"></i>
            <span>Users</span>
          </a>

          <a href="/admin/pages/withdraws.html">
            <i class="fa-solid fa-money-bill-transfer"></i>
            <span>Withdraws</span>
          </a>

          <a href="/admin/pages/transactions.html">
            <i class="fa-solid fa-arrow-right-arrow-left"></i>
            <span>Transactions</span>
          </a>

          <a href="/admin/pages/inr-recharge.html">
            <i class="fa-solid fa-indian-rupee-sign"></i>
            <span>INR Recharges</span>
          </a>

          <a href="/admin/pages/usdt-recharge.html">
            <i class="fa-solid fa-coins"></i>
            <span>USDT Recharges</span>
          </a>

          <a href="/admin/pages/banks.html">
            <i class="fa-solid fa-building-columns"></i>
            <span>Banks</span>
          </a>

          <a href="/admin/pages/gift.html">
            <i class="fa-solid fa-gift"></i>
            <span>Gift Codes</span>
          </a>

          <!----- Products Generater ------->
          <a href="/admin/pages/generate-products.html">
            <i class="fa-solid fa-box"></i>
            <span>Generate Products</span>
          </a>
        </nav>
      </aside>

      <!-- ================= MAIN ================= -->
      <main class="main">
        <!-- ========== TOPBAR ========== -->
        <header class="topbar">
          <div class="topbar-left">
            <button class="menu-toggle" onclick="toggleSidebar()">
              <i class="fa-solid fa-bars"></i>
            </button>
            <h1>User Management</h1>
          </div>

          <div class="topbar-right">
            <button class="logout-btn" onclick="logout()">
              <i class="fa-solid fa-right-from-bracket"></i>
              Logout
            </button>
          </div>
        </header>

        <!-- ========== SEARCH SECTION ========== -->
        <section class="search-section">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input
              type="text"
              id="searchInput"
              placeholder="Search by User ID, Name or Mobile"
            />
          </div>

          <button class="search-btn" onclick="searchUsers()">
            <i class="fa-solid fa-search"></i>
            Search
          </button>
        </section>

        <!-- ========== TABLE SECTION ========== -->
        <section class="table-container">
          <table>
            <thead>
              <tr>
                <th><i class="fa-solid fa-id-card"></i> User ID</th>
                <th><i class="fa-solid fa-user"></i> Name</th>
                <th><i class="fa-solid fa-phone"></i> Mobile</th>
                <th><i class="fa-solid fa-wallet"></i> Wallet</th>
                <th><i class="fa-solid fa-calendar-plus"></i> Created</th>
                <th><i class="fa-solid fa-toggle-on"></i> Status</th>
                <th><i class="fa-solid fa-gears"></i> Action</th>
              </tr>
            </thead>

            <tbody id="userTable">
              <!-- Users load dynamically -->
            </tbody>
          </table>
        </section>
      </main>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- ================= SCRIPTS ================= -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/common.js"></script>
    <!-- <script src="../js/layout.js"></script> -->
    <script src="../js/users.js"></script>
  </body>
</html>
