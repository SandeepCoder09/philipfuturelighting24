<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bank Accounts | Admin</title>

    <link rel="icon" href="/assets/favicon.png" />

    <!-- Main Styles -->
    <link rel="stylesheet" href="../css/style.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="layout">
      <!-- ================= SIDEBAR ================= -->
      <aside class="sidebar" id="sidebar">
        <h2 class="logo">PHILIPS ADMIN</h2>

        <nav class="nav-menu">
          <a href="/admin/index.html">
            <i class="fa-solid fa-gauge"></i>
            <span>Dashboard</span>
          </a>

          <a href="/admin/pages/users.html">
            <i class="fa-solid fa-users"></i>
            <span>Users</span>
          </a>

          <a href="/admin/pages/withdraws.html">
            <i class="fa-solid fa-money-bill-transfer"></i>
            <span>Withdraws</span>
          </a>

          <a href="/admin/pages/transactions.html">
            <i class="fa-solid fa-arrow-right-arrow-left"></i>
            <span>Transactions</span>
          </a>

          <a href="/admin/pages/inr-recharge.html">
            <i class="fa-solid fa-indian-rupee-sign"></i>
            <span>INR Recharges</span>
          </a>
          
          <a href="/admin/pages/usdt-recharge.html">
            <i class="fa-solid fa-coins"></i>
            <span>USDT Recharges</span>
          </a>

          <a href="/admin/pages/banks.html" class="active">
            <i class="fa-solid fa-building-columns"></i>
            <span>Banks</span>
          </a>

          <!-- NEW GIFT MENU -->
          <a href="/admin/pages/gift.html">
            <i class="fa-solid fa-gift"></i>
            <span>Gift Codes</span>
          </a>
        </nav>
      </aside>

      <!-- ================= MAIN ================= -->
      <main class="main">
        <!-- ========== TOPBAR ========== -->
        <header class="topbar">
          <div class="topbar-left">
            <button class="menu-toggle" onclick="toggleSidebar()">
              <i class="fa-solid fa-bars"></i>
            </button>
            <h1>USDT Recharges</h1>
          </div>

          <div class="topbar-right">
            <button class="logout-btn" onclick="logout()">
              <i class="fa-solid fa-right-from-bracket"></i>
              Logout
            </button>
          </div>
        </header>

        <!-- ========== SEARCH SECTION ========== -->
<section class="search-section">

    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input
        type="text"
        id="searchUsdt"
        placeholder="Search by User ID or Txn Hash"
      />
    </div>
  
    <select id="usdtStatusFilter" class="filter-select">
      <option value="">All Status</option>
      <option value="pending">Pending</option>
      <option value="approved">Approved</option>
      <option value="rejected">Rejected</option>
    </select>
  
    <button class="search-btn" onclick="loadUsdtRecharges()">
      <i class="fa-solid fa-search"></i>
      Apply
    </button>
  
  </section>

       <!-- ========== USDT TABLE SECTION ========== -->
<section class="table-wrapper">
    <table class="admin-table">
      <thead>
        <tr>
          <th><i class="fa-solid fa-id-badge"></i> User ID</th>
          <th><i class="fa-solid fa-hashtag"></i> Txn Hash</th>
          <th><i class="fa-solid fa-coins"></i> Amount</th>
          <th><i class="fa-solid fa-circle-info"></i> Status</th>
          <th><i class="fa-solid fa-calendar"></i> Date</th>
          <th><i class="fa-solid fa-gear"></i> Action</th>
        </tr>
      </thead>
  
      <tbody id="usdtTableBody">
        <tr>
          <td colspan="6" class="table-empty">
            Loading USDT deposits...
          </td>
        </tr>
      </tbody>
    </table>
  </section>

    <!-- TOAST CONTAINER -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- ================= CONFIRM MODAL ================= -->
<div id="confirmModal" class="custom-modal">
    <div class="modal-content">
      <h3 id="modalTitle">Confirm Action</h3>
      <p id="modalMessage">Are you sure?</p>
  
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-confirm" id="modalConfirmBtn">Confirm</button>
      </div>
    </div>
  </div>

    <!-- ================= SCRIPTS ================= -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/common.js"></script>
    <!-- <script src="../js/layout.js"></script> -->
    <script src="../js/usdt-recharge.js"></script>
  </body>
</html>
