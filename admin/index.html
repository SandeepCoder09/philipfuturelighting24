<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Philips</title>

  <!-- Main Styles -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

<div class="layout">

  <!-- ================= SIDEBAR ================= -->
  <aside class="sidebar" id="sidebar">
    <h2 class="logo">PHILIPS ADMIN</h2>

    <nav class="nav-menu">

      <a href="index.html" class="active">
        <i class="fa-solid fa-gauge"></i>
        <span>Dashboard</span>
      </a>

      <a href="pages/users.html">
        <i class="fa-solid fa-users"></i>
        <span>Users</span>
      </a>

      <a href="pages/withdraws.html">
        <i class="fa-solid fa-money-bill-transfer"></i>
        <span>Withdraws</span>
      </a>

      <a href="pages/transactions.html">
        <i class="fa-solid fa-arrow-right-arrow-left"></i>
        <span>Transactions</span>
      </a>

      <a href="pages/banks.html">
        <i class="fa-solid fa-building-columns"></i>
        <span>Banks</span>
      </a>

      <!-- NEW GIFT MENU -->
      <a href="pages/gift.html">
        <i class="fa-solid fa-gift"></i>
        <span>Gift Codes</span>
      </a>

    </nav>
  </aside>

  <!-- ================= MAIN ================= -->
  <main class="main">

    <!-- ========== TOPBAR ========== -->
    <header class="topbar">

      <div class="topbar-left">
        <button class="menu-toggle" onclick="toggleSidebar()">
          <i class="fa-solid fa-bars"></i>
        </button>
        <h1>Dashboard Overview</h1>
      </div>

      <div class="topbar-right">
        <button class="logout-btn" onclick="logout()">
          <i class="fa-solid fa-right-from-bracket"></i>
          Logout
        </button>
      </div>

    </header>

    <!-- ========== DASHBOARD CARDS ========== -->
    <section class="cards">

      <div class="card">
        <div class="card-icon">
          <i class="fa-solid fa-users"></i>
        </div>
        <div class="card-content">
          <h3>Total Users</h3>
          <p id="totalUsers">0</p>
        </div>
      </div>

      <div class="card">
        <div class="card-icon">
          <i class="fa-solid fa-wallet"></i>
        </div>
        <div class="card-content">
          <h3>Total Recharge</h3>
          <p id="totalRecharge">₹0</p>
        </div>
      </div>

      <div class="card">
        <div class="card-icon">
          <i class="fa-solid fa-money-bill-wave"></i>
        </div>
        <div class="card-content">
          <h3>Total Withdraw</h3>
          <p id="totalWithdraw">₹0</p>
        </div>
      </div>

      <div class="card">
        <div class="card-icon">
          <i class="fa-solid fa-clock"></i>
        </div>
        <div class="card-content">
          <h3>Pending Withdraw</h3>
          <p id="pendingWithdraw">0</p>
        </div>
      </div>

    </section>

  </main>

</div>
  
<!-- ================= SCRIPTS ================= -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="js/config.js"></script>
<script src="js/common.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
