<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="theme-color" content="#111827" />

    <title>Products | Philips</title>

    <link rel="icon" href="/assets/favicon.png" />

    <!-- Shared CSS -->
    <link rel="stylesheet" href="../shared/css/bottom-nav.css" />
    <link rel="stylesheet" href="../home/style.css" />
    <link rel="stylesheet" href="../products/style.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <!-- ================= NAVBAR ================= -->
    <nav class="navbar">
      <div class="logo-wrapper">
        <a href="../home/index.html">
          <img
            src="../assets/philips-logo-png-transparent.png"
            alt="Philips Logo"
          />
        </a>

        <div class="led-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <div class="nav-right">
        <button
          class="my-products-btn"
          type="button"
          onclick="window.location.href='/products/my-products.html'"
        >
          <i class="fa-solid fa-box"></i> My Products
        </button>
      </div>
    </nav>

    <!-- ================= HEADER ================= -->
    <section class="pricing-header">
      <h1>Our Premium Plans</h1>
      <p>Select the perfect plan for you</p>
    </section>

    <!-- ================= PRODUCTS CONTAINER ================= -->
    <section class="pricing-container" id="productsContainer">
      <!-- Products injected by script.js -->
    </section>

    <!-- ================= LOADING SCREEN ================= -->
    <div class="loading-screen" id="loadingScreen">
      <div class="loader-circle"></div>
      <p>Processing Payment...</p>
    </div>

    <!-- ================= PRODUCT DETAIL BUY MODAL ================= -->
    <div id="buyModal" class="buy-modal">
      <div class="buy-modal-content">
        <div class="modal-header">
          <div class="modal-image-wrapper">
            <img id="modalImage" src="" alt="" />
          </div>
          <h2 id="modalProductName"></h2>
        </div>

        <div class="modal-body">
          <div class="modal-row">
            <span>Price</span>
            <strong>₹<span id="modalPrice"></span></strong>
          </div>

          <div class="modal-row">
            <span>Daily Income</span>
            <strong>₹<span id="modalDaily"></span></strong>
          </div>

          <div class="modal-row">
            <span>Validity</span>
            <strong><span id="modalValidity"></span> Days</strong>
          </div>

          <div class="modal-row">
            <span>Total Return</span>
            <strong>₹<span id="modalTotal"></span></strong>
          </div>

          <div class="modal-row">
            <span>Remaining Limit</span>
            <strong><span id="modalRemaining"></span></strong>
          </div>
        </div>

        <div class="modal-buttons">
          <button id="buyCloseBtn" class="modal-close">Close</button>
          <button id="confirmBuyBtn" class="modal-buy">Buy Now</button>
        </div>
      </div>
    </div>

    <!-- ================= ACTION MODAL ================= -->
    <div id="actionModal" class="buy-modal">
      <div class="buy-modal-content">
        <h2 id="actionTitle"></h2>
        <p
          id="actionMessage"
          style="text-align: center; font-size: 13px; margin-top: 8px"
        ></p>

        <div class="modal-buttons">
          <button id="actionCloseBtn" class="modal-close">Close</button>
          <button id="actionRightBtn" class="modal-buy">OK</button>
        </div>
      </div>
    </div>

    <!-- ================= BOTTOM NAV ================= -->
    <nav class="bottom-nav">
      <a href="../home/index.html" class="nav-btn">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </a>

      <a href="../products/index.html" class="nav-btn active">
        <i class="fa-solid fa-lightbulb"></i>
        <span>Products</span>
      </a>

      <a href="../referrals/index.html" class="nav-btn">
        <i class="fa-solid fa-gift"></i>
        <span>Referrals</span>
      </a>

      <a href="../profile/index.html" class="nav-btn">
        <i class="fa-solid fa-user"></i>
        <span>Profile</span>
      </a>
    </nav>

    <!-- ================= SCRIPTS ================= -->

    <!-- Shared Config -->
    <script src="../shared/js/config.js"></script>

    <!-- Products JS -->
    <script src="../products/script.js"></script>
  </body>
</html>

<!--------------Test----------------->
