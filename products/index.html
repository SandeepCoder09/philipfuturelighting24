<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Shared CSS -->
  <link rel="stylesheet" href="../shared/css/bottom-nav.css" />
  <link rel="stylesheet" href="../home/style.css" />


  <link rel="stylesheet" href="../products/common.css" />

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="theme-color" content="#111827">


  <title>Products | Philips</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="logo-wrapper">
      <a href="../home/index.html">
        <img src="../assets/philips-logo-png-transparent.png" alt="Philips Logo" />
      </a>

      <div class="led-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>


    <div class="nav-right">
      <button 
  class="my-products-btn"
  type="button"
  onclick="window.location.href='my-products.html'">
  <i class="fa-solid fa-box"></i> My Products
</button>
    </div>
  </nav>

  <!-- ===== HEADER ===== -->
  <section class="pricing-header">
    <h1>Our Premium Plans</h1>
    <p>Select the perfect plan for you</p>
  </section>

  <!-- ===== PRODUCTS CONTAINER (Dynamic) ===== -->
  <section class="pricing-container" id="productsContainer">
    <!-- Products will be injected by script.js -->
  </section>

  <!-- ===== LOADING SCREEN ===== -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loader-circle"></div>
    <p>Processing Payment...</p>
  </div>

  <!-- ===== SUCCESS POPUP ===== -->
  <div class="success-overlay" id="successPopup">
    <div class="success-box">
      <h2>Congrats!</h2>
      <p id="successMessage">
        Your earning has started successfully.
      </p>

      <div class="success-buttons">
        <button onclick="closePopup()">OK</button>
        <button onclick="goToMyProducts()">My Products</button>
      </div>
    </div>
  </div>

  <!-- ===== ERROR POPUP ===== -->
  <div class="error-overlay" id="errorPopup">
    <div class="error-box">
      <h2>Error</h2>
      <p id="errorMessage">
        Something went wrong.
      </p>

      <div class="error-buttons">
        <button onclick="closeErrorPopup()">Close</button>
        <button onclick="goToRecharge()">Recharge</button>
      </div>
    </div>
  </div>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bottom-nav">
    <a href="../home/index.html" class="nav-btn">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>

    <a href="../products/index.html" class="nav-btn active">
      <i class="fa-solid fa-lightbulb"></i>
      <span>Products</span>
    </a>

    <a href="../referrals/index.html" class="nav-btn">
      <i class="fa-solid fa-gift"></i>
      <span>Referrals</span>
    </a>

    <a href="../profile/index.html" class="nav-btn">
      <i class="fa-solid fa-user"></i>
      <span>Profile</span>
    </a>
  </nav>

  <!-- Shared Config -->
  <script src="../shared/js/config.js"></script>

  <!-- Main JS -->
  <script src="../products/script.js"></script>

</body>
</html>
