<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="theme-color" content="#0f172a" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <meta fav="" />

    <meta name="mobile-web-app-capable" content="yes" />

    <title>Login | Philips</title>

    <link rel="icon" href="/assets/favicon.png" />

    <link rel="stylesheet" href="../shared/auth/auth.css" />
    <link rel="stylesheet" href="../shared/ui/popup.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="login-container">
      <div class="auth-logo">
        <img src="../assets/philips-ind.jpg" alt="Philips Logo" />
      </div>
      <h2>
        <!-- <i class="fa-solid fa-right-to-bracket"></i> -->
        Philips India
      </h2>

      <form id="loginForm">
        <!-- Mobile -->
        <div class="input-group mobile-group">
          <span class="country-code">+91</span>
          <input
            type="tel"
            id="mobile"
            placeholder="Mobile Number"
            maxlength="10"
            inputmode="numeric"
            required
          />
        </div>

        <!-- Password -->
        <div class="input-group password-group">
          <i class="fa-solid fa-lock"></i>
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />
          <i class="fa-solid fa-eye toggle-password" data-target="password"></i>
        </div>

        <button type="submit" class="auth-btn">
          <span class="btn-text">Login</span>
          <div class="led-dots hidden">
            <span></span><span></span><span></span>
          </div>
        </button>
      </form>

      <p>
        Don't have an account?
        <a href="../auth/register.html">Register</a>
      </p>
    </div>

    <script src="../shared/js/config.js"></script>
    <script src="../shared/ui/popup.js"></script>
    <script src="../auth/script.js"></script>
  </body>
</html>
